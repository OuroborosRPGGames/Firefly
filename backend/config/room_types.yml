# frozen_string_literal: false
#
# Centralized Room Type Configuration
# ====================================
# Every room type must be defined here. Rooms with unlisted types cannot be created.
#
# Usage:
#   RoomTypeConfig.valid?('shop')            # => true
#   RoomTypeConfig.all_types                 # => ['standard', 'safe', ...]
#   RoomTypeConfig.environment('forest')     # => :outdoor
#   RoomTypeConfig.tagged(:street)           # => ['street', 'avenue', 'intersection']
#   RoomTypeConfig.battle_map('cave')        # => { surfaces: [...], ... }
#   RoomTypeConfig.badge_color('combat')     # => 'danger'
#   RoomTypeConfig.icon('shop')              # => '[Shop]'
#
# Tags (used for flexible grouping):
#   street              - Open-air city thoroughfares (for pathfinding, map rendering)
#   building_entrance   - Buildings visible from streets (for street context, adjacency)
#   interior            - Interior rooms shown as buildings on city maps
#   interesting         - Locations the Auto GM considers for adventure generation
#   excluded_from_atmosphere - Rooms that don't receive atmospheric/weather messages
#   combat_zone         - Rooms designed for combat encounters
#
# Environment values: indoor, outdoor, underground
#
# Battle map fields:
#   surfaces          - Floor/ground surface types
#   objects           - Cover objects that can be placed (from CoverObjectType table)
#   density           - Fraction of hexes to fill with cover objects (0.0 - 1.0)
#   dark              - Room is naturally dark
#   difficult_terrain - All hexes are difficult terrain
#   combat_optimized  - Layout is designed for fighting
#   water_chance      - Fraction of hexes with water features (ONLY set per-type; omit to use category default)
#   hazard_chance     - Fraction of hexes with hazards (ONLY set per-type; omit to use category default)
#   explosive_chance  - Fraction of hexes with explosives (ONLY set per-type; omit to use category default)
#   elevation_variance - Max elevation difference in hex units (ONLY set per-type; omit to use category default)
#
# NOTE: water_chance, hazard_chance, explosive_chance, and elevation_variance are
# intentionally NOT in defaults. When absent, BattleMapGeneratorService falls through
# to CATEGORY_DEFAULTS (indoor: 2% hazard, outdoor: 5% hazard + water, underground: 10% hazard + water).

defaults:
  environment: indoor
  badge_color: secondary
  icon: "[Place]"
  battle_map:
    surfaces: [floor]
    objects: []
    density: 0.10
    dark: false
    difficult_terrain: false
    combat_optimized: false

